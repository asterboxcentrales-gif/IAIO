name: Build AI-OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite dispararlo manualmente desde GitHub

jobs:
  build:
    name: Build ISO (NixOS)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Generate flake.lock (first run)
        run: nix flake update --commit-lock-file || nix flake update
        continue-on-error: true

      - name: Build ISO
        run: |
          nix build .#iso \
            --show-trace \
            --log-format bar-with-logs \
            -j auto
        env:
          NIX_REMOTE: ""

      - name: Get ISO info
        run: |
          ISO=$(find result/iso -name "*.iso" | head -1)
          echo "ISO_PATH=$ISO" >> $GITHUB_ENV
          echo "ISO_NAME=$(basename $ISO)" >> $GITHUB_ENV
          ls -lh "$ISO"

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-os-iso
          path: result/iso/*.iso
          retention-days: 30
          compression-level: 0   # ISO ya está comprimida

      - name: Build summary
        run: |
          SIZE=$(du -h "$ISO_PATH" | cut -f1)
          echo "## ✅ AI-OS ISO ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | $ISO_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
